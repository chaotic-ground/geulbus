name: release

# crates.io Trusted Publishing (GitHub Actions OIDC), 장기 API 토큰 없이 게시.
#
# 주의: Trusted Publisher 는 이미 게시된 크레이트에만 등록할 수 있다(RFC 3691).
# geulbus-core 는 게시되어 있으므로 crates.io 크레이트 설정에서 이 repo
# (chaotic-ground/geulbus)와 워크플로 파일명(release.yml)을 Trusted Publisher 로
# 등록하면 v* 태그 푸시(또는 수동 실행)로 게시된다.
#
# release-please.yaml 이 main 에 release-PR 을 만들고 merge 되면 GitHub Release/
# 태그를 만든다. release-please 가 만든 태그가 push 이벤트를 안정적으로 발생시키지
# 않는 경우가 있어(알려진 함정), release: published 도 트리거에 같이 둔다.
#
# geulbus(바이너리)는 아직 미게시라 이 워크플로 대상이 아니다. 첫 게시는
# 로컬에서 `cargo login && cargo publish -p geulbus` 로 수동으로 하고,
# Trusted Publisher 등록 후 아래 publish 단계에 추가한다.

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*"

# release: published 와 push: tags 가 같은 태그에 대해 동시에 걸릴 수 있어(위 주석
# 참고), 같은 태그끼리는 겹쳐 실행되지 않도록 묶는다(먼저 끝난 쪽이 게시를 마치면
# 뒤쪽은 실패해도 무해함 — crates.io 가 같은 버전 재게시를 거부할 뿐).
concurrency:
  group: release-publish-${{ github.event.release.tag_name || github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC 토큰 발급(필수)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-features
      - run: cargo publish -p geulbus-core --dry-run
      - name: crates.io 인증 토큰(OIDC) 교환
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish -p geulbus-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
